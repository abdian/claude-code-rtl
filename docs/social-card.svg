<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" font-family="ui-sans-serif, -apple-system, Segoe UI, Roboto, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d1117"/>
      <stop offset="1" stop-color="#161b22"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.82" cy="0.18" r="0.6">
      <stop offset="0" stop-color="#d97757" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#d97757" stop-opacity="0"/>
    </radialGradient>
    <style>
      .mono { font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace; }
    </style>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- ================= LEFT: message ================= -->
  <g transform="translate(90,150)">
    <text x="4" y="0" fill="#8b949e" font-size="20" letter-spacing="5" font-weight="600">VS CODE · CLAUDE CODE</text>

    <text x="0" y="78" fill="#e6edf3" font-size="70" font-weight="800">Right-to-left</text>
    <text x="0" y="152" fill="#e6edf3" font-size="70" font-weight="800">chat, done <tspan fill="#d97757">right</tspan>.</text>

    <text x="4" y="212" fill="#adbac7" font-size="26">Flip the Claude Code chat to RTL, with a clean</text>
    <text x="4" y="248" fill="#adbac7" font-size="26">bundled font. Code &amp; diffs stay perfectly intact.</text>

    <!-- feature chips -->
    <g font-size="19" font-weight="600">
      <g transform="translate(4,300)">
        <rect width="150" height="42" rx="21" fill="#21262d" stroke="#30363d"/>
        <text x="75" y="27" fill="#c9d1d9" text-anchor="middle">one click</text>
      </g>
      <g transform="translate(168,300)">
        <rect width="240" height="42" rx="21" fill="#21262d" stroke="#30363d"/>
        <text x="120" y="27" fill="#c9d1d9" text-anchor="middle">Windows · macOS · Linux</text>
      </g>
      <g transform="translate(422,300)">
        <rect width="150" height="42" rx="21" fill="#21262d" stroke="#30363d"/>
        <text x="75" y="27" fill="#c9d1d9" text-anchor="middle">reversible</text>
      </g>
    </g>

    <!-- github url -->
    <g transform="translate(4,372)">
      <circle cx="16" cy="16" r="16" fill="#d97757"/>
      <path transform="translate(6,6) scale(0.42)" fill="#0d1117" d="M24 1C11 1 1 11 1 24c0 10 6.6 18.6 15.8 21.6 1.2.2 1.6-.5 1.6-1.1v-4c-6.4 1.4-7.8-3.1-7.8-3.1-1-2.7-2.6-3.4-2.6-3.4-2.1-1.4.2-1.4.2-1.4 2.3.2 3.5 2.4 3.5 2.4 2.1 3.6 5.5 2.6 6.8 2 .2-1.5.8-2.6 1.5-3.2-5.1-.6-10.5-2.6-10.5-11.4 0-2.5.9-4.6 2.4-6.2-.2-.6-1-3 .2-6.2 0 0 1.9-.6 6.4 2.4a22 22 0 0 1 11.6 0C33 8.9 35 9.5 35 9.5c1.2 3.2.4 5.6.2 6.2 1.5 1.6 2.4 3.7 2.4 6.2 0 8.8-5.4 10.8-10.5 11.4.8.7 1.6 2.1 1.6 4.2v6.2c0 .6.4 1.3 1.6 1.1C41.4 42.6 48 34 48 24 48 11 38 1 24 1z"/>
      <text x="46" y="23" class="mono" fill="#e6edf3" font-size="26" font-weight="600">github.com/abdian/claude-code-rtl</text>
    </g>
  </g>

  <!-- ================= RIGHT: terminal window ================= -->
  <g transform="translate(700,150)">
    <rect width="420" height="330" rx="16" fill="#0b0e14" stroke="#30363d" stroke-width="1.5"/>
    <!-- title bar -->
    <circle cx="28" cy="26" r="6" fill="#f85149"/>
    <circle cx="50" cy="26" r="6" fill="#d29922"/>
    <circle cx="72" cy="26" r="6" fill="#3fb950"/>
    <text x="210" y="31" class="mono" fill="#6e7681" font-size="15" text-anchor="middle">claude-code-rtl</text>
    <line x1="0" y1="52" x2="420" y2="52" stroke="#21262d"/>

    <!-- orange title box (mirrors the real installer banner) -->
    <rect x="70" y="78" width="280" height="52" rx="9" fill="none" stroke="#d97757" stroke-width="2"/>
    <text x="210" y="111" class="mono" fill="#d97757" font-size="22" font-weight="700" text-anchor="middle">Claude Code · RTL</text>
    <text x="210" y="150" class="mono" fill="#6e7681" font-size="15" text-anchor="middle">right-to-left  +  Vazir font</text>

    <!-- before / after message bars -->
    <text x="34" y="194" class="mono" fill="#484f58" font-size="13">before</text>
    <rect x="34" y="202" width="230" height="14" rx="7" fill="#21262d"/>
    <rect x="34" y="222" width="150" height="14" rx="7" fill="#21262d"/>

    <text x="386" y="262" class="mono" fill="#d97757" font-size="13" text-anchor="end">after ←</text>
    <rect x="156" y="270" width="230" height="14" rx="7" fill="#d97757" opacity="0.9"/>
    <rect x="236" y="290" width="150" height="14" rx="7" fill="#d97757" opacity="0.55"/>
  </g>
</svg>
